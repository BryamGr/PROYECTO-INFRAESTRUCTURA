- name: Build & push imágenes a ECR y aplicar Terraform
  hosts: localhost
  connection: local
  vars_files:
    - envs/prod.yml

  pre_tasks:
    - name: Requisitos de colecciones
      debug:
        msg: "Ejecuta: ansible-galaxy collection install -r config/requirements.yml"

    - name: Validar variables mínimas
      assert:
        that:
          - project_name | length > 0
          - aws_region | length > 0
          - frontend_bucket_name | length > 0
          - uploads_bucket_name | length > 0
          - db_password | length > 0
          - auth_context_dir | length > 0
          - inventario_context_dir | length > 0
          - reportes_context_dir | length > 0

  tasks:
    - name: Obtener ID de la cuenta AWS 
      command: aws sts get-caller-identity --query Account --output text
      register: aws_caller
      changed_when: false

    - name: Guardar ID de cuenta AWS en fact
      set_fact:
        aws_account_id: "{{ aws_caller.stdout | trim }}"

    - name: Construir URIs de repos ECR
      set_fact:
        ecr_auth_uri: "{{ aws_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com/{{ ecr_repo_prefix }}/auth"
        ecr_inv_uri:  "{{ aws_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com/{{ ecr_repo_prefix }}/inventario"
        ecr_rep_uri:  "{{ aws_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com/{{ ecr_repo_prefix }}/reportes"

    - name: Crear repos ECR si no existen (auth, inventario, reportes)
      become: true
      shell: |
        aws ecr describe-repositories \
          --repository-names {{ ecr_repo_prefix }}/{{ item }} \
          --region {{ aws_region }} >/dev/null 2>&1 \
        || aws ecr create-repository \
          --repository-name {{ ecr_repo_prefix }}/{{ item }} \
          --region {{ aws_region }} \
          --image-tag-mutability MUTABLE \
          --image-scanning-configuration scanOnPush=true >/dev/null
      loop:
        - auth
        - inventario
        - reportes
      register: ecr_create
      changed_when: ecr_create.rc == 0

    - name: Login a ECR usando CLI de Docker
      become: true
      shell: |
        aws ecr get-login-password --region {{ aws_region }} \
        | docker login --username AWS --password-stdin {{ aws_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com
      register: ecr_login
      changed_when: "'Login Succeeded' in ecr_login.stdout"

    - name: Build imagen AUTH
      become: true
      command: docker build -t {{ ecr_auth_uri }}:{{ image_tag | default('latest') }} -f Dockerfile .
      args:
        chdir: "{{ auth_context_dir }}"

    - name: Push imagen AUTH
      become: true
      command: docker push {{ ecr_auth_uri }}:{{ image_tag | default('latest') }}

    - name: Build imagen INVENTARIO
      become: true
      command: docker build -t {{ ecr_inv_uri }}:{{ image_tag | default('latest') }} -f Dockerfile .
      args:
        chdir: "{{ inventario_context_dir }}"

    - name: Push imagen INVENTARIO
      become: true
      command: docker push {{ ecr_inv_uri }}:{{ image_tag | default('latest') }}

    - name: Build imagen REPORTES
      become: true
      command: docker build -t {{ ecr_rep_uri }}:{{ image_tag | default('latest') }} -f Dockerfile .
      args:
        chdir: "{{ reportes_context_dir }}"

    - name: Push imagen REPORTES
      become: true
      command: docker push {{ ecr_rep_uri }}:{{ image_tag | default('latest') }}

    - name: Definir imágenes para Terraform
      set_fact:
        auth_image: "{{ ecr_auth_uri }}:{{ image_tag | default('latest') }}"
        inventario_image: "{{ ecr_inv_uri }}:{{ image_tag | default('latest') }}"
        reportes_image: "{{ ecr_rep_uri }}:{{ image_tag | default('latest') }}"

    - name: Instalar dependencias de Lambda 
      community.general.npm:
        path: "{{ playbook_dir }}/../lambda_src"
        production: true

    - name: Crear bucket S3 para el estado remoto (si no existe, vía AWS CLI)
      become: true
      shell: |

        BUCKET="{{ tf_state_bucket }}"
        REGION="{{ tf_state_region | default(aws_region) }}"
        echo "Usando bucket: $BUCKET en región: $REGION..."
        if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
          echo "Bucket ya existe"
          exit 0
        fi

        echo "Creando bucket $BUCKET en región $REGION..."

        if [ "$REGION" = "us-east-1" ]; then
          aws s3api create-bucket \
            --bucket "$BUCKET" \
            --region "$REGION"
        else
          aws s3api create-bucket \
            --bucket "$BUCKET" \
            --region "$REGION" \
            --create-bucket-configuration LocationConstraint="$REGION"
        fi
      register: tf_bucket_result
      changed_when: "'Creando bucket' in tf_bucket_result.stdout"

    - name: Terraform Init & Apply
      community.general.terraform:
        project_path: "{{ playbook_dir }}/.."
        state: present
        force_init: true
        backend_config:
          bucket: "{{ tf_state_bucket }}"
          key: "{{ tf_state_key }}"

          region: "{{ tf_state_region | default(aws_region) }}"
        variables:
          aws_region: "{{ aws_region }}"
          aws_profile: "{{ aws_profile | default(omit) }}"

          project_name: "{{ project_name }}"
          domain_name: "{{ domain_name | default(omit) }}"
          hosted_zone_id: "{{ hosted_zone_id | default(omit) }}"
          waf_enable: "{{ waf_enable }}"
          acm_certificate_arn: "{{ acm_certificate_arn | default(omit) }}"

          frontend_bucket_name: "{{ frontend_bucket_name }}"
          auth_frontend_bucket_name: "{{ auth_frontend_bucket_name }}"
          uploads_bucket_name: "{{ uploads_bucket_name }}"

          ecr_repo_prefix: "{{ ecr_repo_prefix }}"
          auth_image: "{{ auth_image }}"
          inventario_image: "{{ inventario_image }}"
          reportes_image: "{{ reportes_image }}"

          db_engine: "{{ db_engine }}"
          db_engine_version: "{{ db_engine_version }}"
          db_instance_class: "{{ db_instance_class }}"
          db_name: "{{ db_name }}"
          db_username: "{{ db_username }}"
          db_password: "{{ db_password }}"

          inventario_port: "{{ inventario_port }}"
          reportes_port: "{{ reportes_port }}"
          auth_port: "{{ auth_port }}"
          desired_count_auth: "{{ desired_count_auth }}"
          desired_count_inventario: "{{ desired_count_inventario }}"
          desired_count_reportes: "{{ desired_count_reportes }}"

          enable_nat_gateway: "{{ enable_nat_gateway }}"
          api_stage_name: "{{ api_stage_name }}"
          jwt_secret: "{{ jwt_secret }}"
          tags: "{{ tags }}"

          azs:
            - "{{ aws_region }}a"
            - "{{ aws_region }}b"
    - name: Subir Dashboard a S3
      when: enable_frontend | default(false)
      command: >
        aws s3 sync "{{ dashboard_src_dir }}"
        "s3://{{ frontend_bucket_name }}/"
        --delete
      changed_when: false

    - name: Subir Auth a S3
      when: enable_frontend | default(false)
      command: >
        aws s3 sync "{{ auth_src_dir }}"
        "s3://{{ auth_frontend_bucket_name }}/"
        --delete
      changed_when: false

    - name: Obtener ID de la distribución de CloudFront (si existe)
      when: enable_frontend | default(false)
      shell: terraform output -raw cloudfront_distribution_id
      args:
        chdir: "{{ playbook_dir }}/.."
      register: cfid_result
      changed_when: false
      failed_when: false

    - name: Guardar ID si es válido
      when: enable_frontend | default(false)
      set_fact:
        cfid: "{{ (cfid_result.stdout | default('')) | trim }}"
      changed_when: false

    - name: Invalidar CloudFront (index de dashboard y auth)
      when:
        - enable_frontend | default(false)
        - cfid is defined
        - cfid | length > 0
      command: >
        aws cloudfront create-invalidation
        --distribution-id "{{ cfid }}"
        --paths "/Dashboard/index.html" "/auth/index.html"
      register: invalidation
      changed_when: true
